<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <main class="card-container">
    <picture>
      <source media="(min-width: 768px)" srcset="./images/image-product-desktop.jpg" />
      <img class="hero" src="./images/image-product-mobile.jpg" alt="Image of Chanel Perfume bottle lying down on side" />
    </picture>
    
    
    <div class="content-wrapper">
      <span class="category">PERFUME</span>

      <h1>Gabrielle Essence Eau De Parfum</h1>

      <section class="description">
      A floral, solar and voluptuous interpretation composed by Olivier Polge, 
      Perfumer-Creator for the House of CHANEL.
      </section>

      <section class="price">
      <span class="price_main">$149.99</span>
      <s>$169.99</s>
      </section>

      <button class="cart-link"><img alt="shopping cart icon" src="./images/icon-cart.svg"/>Add to Cart</button>

    </div>
  </main>
</body>
</html>
